<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- cream background -->
  <rect width="64" height="64" rx="14" fill="#f5f0e3"/>
  <!-- "1" with serif cap -->
  <line x1="12" y1="14" x2="12" y2="50" stroke="#2e7b74" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="8.5" y1="14" x2="15.5" y2="14" stroke="#2e7b74" stroke-width="4" stroke-linecap="round"/>
  <line x1="7.5" y1="10" x2="16.5" y2="10" stroke="#2e7b74" stroke-width="3" stroke-linecap="round"/>
  <!-- left "0" -->
  <circle cx="31" cy="32" r="13" stroke="#2e7b74" stroke-width="5.5" fill="none"/>
  <!-- right "0" -->
  <circle cx="52" cy="32" r="9" stroke="#2e7b74" stroke-width="4.5" fill="none"/>
  <!-- cursor -->
  <polygon points="56,20 56,33 58.5,30.5 60,35 62.5,34 61,30 63.5,30" fill="#FF6B35" stroke="#f5f0e3" stroke-width="1" stroke-linejoin="round"/>
  <!-- ripple arcs -->
  <path d="M 64,25 A 8,8 0 0 1 64,39" stroke="#FF6B35" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
</svg>
