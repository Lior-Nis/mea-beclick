<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <style>
      .sparkle { animation: twinkle 2s ease-in-out infinite; }
      .sparkle2 { animation: twinkle 2s ease-in-out infinite 0.4s; }
      .sparkle3 { animation: twinkle 2s ease-in-out infinite 0.8s; }
      .sparkle4 { animation: twinkle 2s ease-in-out infinite 1.2s; }
      .sparkle5 { animation: twinkle 2s ease-in-out infinite 1.6s; }
      @keyframes twinkle {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.6); }
      }
    </style>
    <!-- Outer glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- White background -->
  <rect width="400" height="400" fill="#FFFFFF" rx="24"/>

  <!-- Outer ring -->
  <circle cx="200" cy="175" r="135" fill="none" stroke="#6366F1" stroke-width="3" opacity="0.4"/>

  <!-- Main filled circle -->
  <circle cx="200" cy="175" r="118" fill="#6366F1"/>

  <!-- Inner subtle ring for depth -->
  <circle cx="200" cy="175" r="112" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- "100" text inside circle -->
  <text x="200" y="207" font-family="'Segoe UI', 'Arial Black', sans-serif" font-size="96" fill="white" font-weight="900" text-anchor="middle" letter-spacing="-4">100</text>

  <!-- 4-pointed gold star sparkles scattered around circle -->
  <!-- Star shape: 4 points using polygon -->
  <!-- Top-left area -->
  <g transform="translate(82, 72) rotate(15)" class="sparkle">
    <polygon points="0,-10 2.5,-2.5 10,0 2.5,2.5 0,10 -2.5,2.5 -10,0 -2.5,-2.5" fill="#F5C518"/>
  </g>
  <!-- Top area -->
  <g transform="translate(200, 42) rotate(0)" class="sparkle2">
    <polygon points="0,-8 2,-2 8,0 2,2 0,8 -2,2 -8,0 -2,-2" fill="#F5C518"/>
  </g>
  <!-- Top-right -->
  <g transform="translate(318, 68) rotate(-10)" class="sparkle3">
    <polygon points="0,-12 3,-3 12,0 3,3 0,12 -3,3 -12,0 -3,-3" fill="#F5C518"/>
  </g>
  <!-- Right side -->
  <g transform="translate(342, 155) rotate(20)" class="sparkle4">
    <polygon points="0,-7 1.75,-1.75 7,0 1.75,1.75 0,7 -1.75,1.75 -7,0 -1.75,-1.75" fill="#F5C518"/>
  </g>
  <!-- Left side -->
  <g transform="translate(58, 155) rotate(-5)" class="sparkle5">
    <polygon points="0,-9 2.25,-2.25 9,0 2.25,2.25 0,9 -2.25,2.25 -9,0 -2.25,-2.25" fill="#F5C518"/>
  </g>
  <!-- Bottom-right -->
  <g transform="translate(305, 272) rotate(8)" class="sparkle2">
    <polygon points="0,-8 2,-2 8,0 2,2 0,8 -2,2 -8,0 -2,-2" fill="#F5C518"/>
  </g>
  <!-- Bottom-left -->
  <g transform="translate(95, 270) rotate(-12)" class="sparkle">
    <polygon points="0,-6 1.5,-1.5 6,0 1.5,1.5 0,6 -1.5,1.5 -6,0 -1.5,-1.5" fill="#F5C518"/>
  </g>

  <!-- Separator line -->
  <line x1="110" y1="322" x2="290" y2="322" stroke="#6366F1" stroke-width="1.5" opacity="0.4"/>

  <!-- Hebrew brand name below circle -->
  <text x="200" y="360" font-family="'Segoe UI', Arial, sans-serif" font-size="30" fill="#1E1B4B" font-weight="700" text-anchor="middle" direction="rtl">מאה בקליק</text>

  <!-- Subtitle -->
  <text x="200" y="388" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#6366F1" font-weight="400" text-anchor="middle" letter-spacing="2">MAAH BAKLIK</text>
</svg>
