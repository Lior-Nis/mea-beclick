<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>לוח בקרה — שיעורים פרטיים</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    /* ── Design Tokens (landing page system) ── */
    :root {
      --bg:           #FEF9E7;
      --surface:      #FAFDF9;
      --card:         #ffffff;
      --accent:       #008080;
      --accent-soft:  #2AA8A8;
      --accent-dim:   rgba(0,128,128,0.08);
      --accent-glow:  rgba(0,128,128,0.18);
      --accent-border:rgba(0,128,128,0.22);
      --coral:        #FF7F50;
      --coral-dim:    rgba(255,127,80,0.10);
      --coral-border: rgba(255,127,80,0.35);
      --text:         #1A3333;
      --muted:        #4A7878;
      --faint:        #C5DFDF;
      --border-card:  #7FBFBF;
      --green:        #16a34a;
      --green-dim:    rgba(22,163,74,0.10);
      --green-border: rgba(22,163,74,0.30);
      --red:          #dc2626;
      --red-dim:      rgba(220,38,38,0.08);
      --red-border:   rgba(220,38,38,0.28);
      --shadow:       rgba(0,80,80,0.07);
      --shadow-md:    rgba(0,80,80,0.13);
      --nav-bg:       rgba(254,249,231,0.92);
      --r-sm: 10px; --r-md: 16px; --r-lg: 22px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; scroll-behavior: smooth; }
    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; overflow-x: hidden; direction: rtl; line-height: 1.7;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: radial-gradient(var(--border-card) 1.5px, transparent 1.5px);
      background-size: 28px 28px; opacity: 0.3;
      pointer-events: none; z-index: 0;
    }
    * { position: relative; }

    input, textarea, select, button { font-family: 'Heebo', sans-serif; }
    input[type="text"], input[type="date"], input[type="time"], input[type="number"],
    textarea, select {
      background: var(--surface); border: 1.5px solid var(--faint);
      color: var(--text); border-radius: var(--r-sm); padding: 8px 12px;
      font-size: 0.88rem; width: 100%; outline: none; transition: border-color 0.2s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 70px; }

    /* ── Lock Screen ── */
    #lock-screen {
      position: fixed; inset: 0;
      background: linear-gradient(160deg, #e6f7f7 0%, var(--bg) 60%, #fef9e7 100%);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; flex-direction: column; gap: 20px;
    }
    #lock-screen h2 { font-size: 2rem; font-weight: 900; color: var(--accent); }
    #lock-screen p { color: var(--muted); }
    #lock-screen input {
      width: 280px; font-size: 1.1rem; text-align: center;
      letter-spacing: .12em; background: var(--card);
      border: 1.5px solid var(--faint);
    }
    #lock-screen button {
      background: var(--accent); color: #fff;
      font-size: 1rem; font-weight: 800;
      padding: 11px 44px; border-radius: 30px; border: none; cursor: pointer;
      transition: opacity .2s, transform .15s;
    }
    #lock-screen button:hover { opacity: .88; transform: translateY(-1px); }
    #lock-error { color: var(--red); font-size: 0.9rem; min-height: 20px; }

    /* ── Nav ── */
    #nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--nav-bg); backdrop-filter: blur(16px) saturate(160%);
      border-bottom: 1px solid var(--border-card);
      padding: 0 2rem; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 1px 12px var(--shadow);
    }
    .nav-logo { font-size: 1.05rem; font-weight: 900; color: var(--text); }
    .nav-logo span { color: var(--muted); font-weight: 400; font-size: .88rem; margin-right: 8px; }
    .nav-actions { display: flex; gap: 10px; align-items: center; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px; border: none; cursor: pointer;
      font-family: 'Heebo', sans-serif; font-weight: 700; border-radius: var(--r-sm);
      padding: 8px 18px; font-size: .85rem; transition: opacity .2s, transform .15s;
      text-decoration: none;
    }
    .btn:hover { opacity: .88; transform: translateY(-1px); }
    .btn-gold  { background: var(--accent); color: #fff; }
    .btn-outline { background: var(--accent-dim); border: 1.5px solid var(--accent-border); color: var(--accent); }
    .btn-ghost { background: rgba(0,128,128,0.04); border: 1.5px solid var(--faint); color: var(--muted); }
    .btn-danger { background: var(--red-dim); border: 1px solid var(--red-border); color: var(--red); }
    .btn-sm { padding: 5px 12px; font-size: .78rem; }

    /* ── Layout ── */
    .page { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }

    /* ── Stats bar ── */
    .stats-bar {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px; margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--card); border: 1px solid var(--faint);
      border-radius: var(--r-md); padding: 20px;
      box-shadow: 0 2px 12px var(--shadow);
    }
    .stat-card .s-label { font-size: .72rem; font-weight: 700; color: var(--muted);
      letter-spacing: .08em; text-transform: uppercase; margin-bottom: 6px; }
    .stat-card .s-value { font-size: 2rem; font-weight: 900; color: var(--text); }
    .stat-card .s-value.gold  { color: var(--accent); }
    .stat-card .s-value.green { color: var(--green); }
    .stat-card .s-value.red   { color: var(--red); }
    .stat-card .s-sub { font-size: .78rem; color: var(--muted); margin-top: 4px; }

    /* ── Section header ── */
    .sec-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.2rem;
    }
    .sec-header h2 { font-size: 1.2rem; font-weight: 800; color: var(--text); }
    .sec-header .s-label2 { font-size: .72rem; font-weight: 700; color: var(--accent);
      letter-spacing: .1em; text-transform: uppercase; }

    /* ── Students grid ── */
    .students-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(520px, 1fr));
      gap: 20px;
    }

    /* ── Student card ── */
    .student-card {
      background: var(--card); border: 1px solid var(--faint);
      border-radius: var(--r-lg); overflow: hidden;
      box-shadow: 0 2px 16px var(--shadow);
      transition: border-color .2s, box-shadow .2s;
    }
    .student-card:hover { border-color: var(--accent-soft); box-shadow: 0 4px 24px var(--accent-glow); }

    .sc-header {
      background: linear-gradient(135deg, var(--accent-dim), rgba(255,127,80,0.04));
      border-bottom: 1px solid var(--faint);
      padding: 18px 24px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .sc-header-left { display: flex; align-items: center; gap: 14px; }
    .sc-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--accent-dim); border: 2px solid var(--accent-border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; flex-shrink: 0;
    }
    .sc-name { font-size: 1.1rem; font-weight: 800; color: var(--text); }
    .sc-subject { font-size: .82rem; color: var(--muted); margin-top: 2px; }
    .sc-badges { display: flex; gap: 6px; flex-wrap: wrap; }
    .badge { font-size: .72rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; letter-spacing: .04em; }
    .badge-level { background: var(--accent-dim); border: 1px solid var(--accent-border); color: var(--accent); }
    .badge-style { background: var(--coral-dim); border: 1px solid var(--coral-border); color: var(--coral); }
    .badge-ok    { background: var(--green-dim); border: 1px solid var(--green-border); color: var(--green); }
    .badge-warn  { background: var(--red-dim);   border: 1px solid var(--red-border);   color: var(--red); }

    .sc-body { padding: 0; }

    /* Tabs */
    .sc-tabs { display: flex; border-bottom: 1px solid var(--faint); padding: 0 24px; gap: 0; }
    .sc-tab {
      font-size: .82rem; font-weight: 700; color: var(--muted);
      padding: 10px 16px; cursor: pointer; border-bottom: 2px solid transparent;
      transition: color .2s, border-color .2s; white-space: nowrap;
    }
    .sc-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .sc-tab:hover:not(.active) { color: var(--text); }

    .sc-panel { display: none; padding: 20px 24px; }
    .sc-panel.active { display: block; }

    /* Fields */
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .field-row.single { grid-template-columns: 1fr; }
    .field-row.three  { grid-template-columns: 1fr 1fr 1fr; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: .72rem; font-weight: 700; color: var(--muted);
      letter-spacing: .05em; text-transform: uppercase; }

    /* Payments table */
    .payments-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    .payments-table th {
      text-align: right; padding: 8px 10px; color: var(--accent);
      font-size: .72rem; letter-spacing: .06em; text-transform: uppercase;
      border-bottom: 1.5px solid var(--faint); background: var(--accent-dim);
    }
    .payments-table td { padding: 8px 10px; border-bottom: 1px solid var(--faint); color: var(--text); }
    .payments-table tr:last-child td { border-bottom: none; }
    .payments-table tr:hover td { background: var(--accent-dim); }
    .paid-badge   { color: var(--green); font-weight: 700; font-size: .8rem; }
    .unpaid-badge { color: var(--red);   font-weight: 700; font-size: .8rem; }

    .payment-summary {
      display: flex; gap: 20px; margin-bottom: 14px;
      padding: 12px 16px; background: var(--accent-dim);
      border: 1px solid var(--accent-border); border-radius: var(--r-md);
    }
    .ps-item { text-align: center; }
    .ps-item .psi-val { font-size: 1.3rem; font-weight: 900; }
    .ps-item .psi-lbl { font-size: .72rem; color: var(--muted); margin-top: 2px; }

    /* Next lesson */
    .next-lesson-box {
      background: var(--accent-dim); border: 1px solid var(--accent-border);
      border-radius: var(--r-md); padding: 16px;
    }
    .nl-label { font-size: .72rem; font-weight: 700; color: var(--accent);
      letter-spacing: .1em; text-transform: uppercase; margin-bottom: 10px; }
    .nl-date { font-size: 1.5rem; font-weight: 900; color: var(--text); }
    .nl-meta { font-size: .85rem; color: var(--muted); margin-top: 4px; }

    /* Homework */
    .hw-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 10px 0; border-bottom: 1px solid var(--faint);
    }
    .hw-item:last-child { border-bottom: none; }
    .hw-check {
      width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0;
      border: 1.5px solid var(--faint); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, border-color .2s; margin-top: 2px;
    }
    .hw-check.done { background: var(--green); border-color: var(--green); color: #fff; font-size: .8rem; }
    .hw-text { flex: 1; }
    .hw-task { font-size: .9rem; color: var(--text); }
    .hw-task.done-text { text-decoration: line-through; color: var(--muted); }
    .hw-date { font-size: .75rem; color: var(--muted); margin-top: 2px; }

    /* Progress bar */
    .progress-bar-wrap { margin: 8px 0 16px; }
    .progress-bar-label { display: flex; justify-content: space-between;
      font-size: .78rem; color: var(--muted); margin-bottom: 5px; }
    .progress-bar-bg { height: 8px; background: var(--faint); border-radius: 4px; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 4px; transition: width .4s;
      background: linear-gradient(90deg, var(--accent), var(--accent-soft)); }

    /* Add form */
    .add-form {
      background: var(--surface); border: 1.5px solid var(--faint);
      border-radius: var(--r-md); padding: 16px; margin-bottom: 14px; display: none;
    }
    .add-form.open { display: block; }
    .add-form h4 { font-size: .85rem; font-weight: 700; color: var(--accent); margin-bottom: 12px; }

    /* Modal */
    #modal-bg {
      position: fixed; inset: 0; background: rgba(26,51,51,0.4);
      backdrop-filter: blur(6px); z-index: 500;
      display: none; align-items: center; justify-content: center;
    }
    #modal-bg.open { display: flex; }
    #modal {
      background: var(--card); border: 1px solid var(--faint);
      border-radius: var(--r-lg); padding: 32px; width: min(560px, 95vw);
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 12px 48px var(--shadow-md);
    }
    #modal h3 { font-size: 1.2rem; font-weight: 800; color: var(--accent); margin-bottom: 20px; }

    /* Divider */
    .divider { height: 1px; background: var(--faint); margin: 14px 0; }

    /* Empty state */
    .empty { text-align: center; padding: 24px; color: var(--muted); font-size: .9rem; }

    .save-indicator {
      font-size: .75rem; color: var(--green); opacity: 0;
      transition: opacity .3s; margin-right: 8px;
    }
    .save-indicator.show { opacity: 1; }

    @media (max-width: 600px) {
      .students-grid { grid-template-columns: 1fr; }
      .field-row { grid-template-columns: 1fr; }
      .field-row.three { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- ── LOCK SCREEN ── -->
<div id="lock-screen">
  <div style="font-size:3rem">🎓</div>
  <h2>לוח בקרה</h2>
  <p>ניקול וליאור · שיעורים פרטיים</p>
  <input type="password" id="pw-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkPw()"/>
  <button onclick="checkPw()">כניסה</button>
  <div id="lock-error"></div>
</div>

<!-- ── NAV ── -->
<div id="nav" style="display:none">
  <div class="nav-logo">לוח בקרה <span>ניקול וליאור · שיעורים פרטיים</span></div>
  <div class="nav-actions">
    <span class="save-indicator" id="save-indicator">✓ נשמר</span>
    <button class="btn btn-outline" onclick="openModal()">+ תלמיד חדש</button>
    <a href="index.html" class="btn btn-ghost">← האתר</a>
  </div>
</div>

<!-- ── MAIN PAGE ── -->
<div class="page" id="main-page" style="display:none">

  <!-- Stats bar -->
  <div class="stats-bar" id="stats-bar"></div>

  <!-- Students -->
  <div class="sec-header">
    <div>
      <div class="sec-label2" style="font-size:.75rem;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;">תלמידים פעילים</div>
      <h2 style="font-size:1.3rem;font-weight:800">לוח תלמידים</h2>
    </div>
  </div>
  <div class="students-grid" id="students-grid"></div>

</div>

<!-- ── ADD STUDENT MODAL ── -->
<div id="modal-bg">
  <div id="modal">
    <h3>➕ הוספת תלמיד חדש</h3>
    <div class="field-row">
      <div class="field"><label>שם</label><input type="text" id="ns-name" placeholder="שם התלמיד"/></div>
      <div class="field"><label>מקצוע</label><input type="text" id="ns-subject" placeholder="מתמטיקה, פיזיקה..."/></div>
    </div>
    <div class="field-row three">
      <div class="field"><label>רמה</label>
        <select id="ns-level">
          <option>מתחיל</option><option>בינוני</option><option>מתקדם</option><option>מצטיין</option>
        </select>
      </div>
      <div class="field"><label>סגנון למידה</label>
        <select id="ns-style">
          <option>ויזואלי</option><option>שמיעתי</option><option>קינסתטי</option><option>קריאה/כתיבה</option>
        </select>
      </div>
      <div class="field"><label>אמוג׳י</label><input type="text" id="ns-emoji" placeholder="🎓" maxlength="2"/></div>
    </div>
    <div class="field-row single">
      <div class="field"><label>מטרות</label><textarea id="ns-goals" placeholder="המטרות של התלמיד..."></textarea></div>
    </div>
    <div class="field-row">
      <div class="field"><label>טלפון תלמיד/ה</label><input type="text" id="ns-phone" placeholder="05X-XXX-XXXX"/></div>
      <div class="field"><label>טלפון הורה</label><input type="text" id="ns-parent" placeholder="05X-XXX-XXXX"/></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:16px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeModal()">ביטול</button>
      <button class="btn btn-gold" onclick="addStudent()">➕ הוסף תלמיד</button>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════
   DATA
══════════════════════════════════════ */
const PASSWORD = 'nikol2026'; // ← שנה כאן את הסיסמה

function loadData() {
  const raw = localStorage.getItem('tutor_dashboard_v2');
  if (raw) {
    const parsed = JSON.parse(raw);
    // migration: remove Lior (test student)
    const liorIdx = parsed.students.findIndex(s => s.name === 'ליאור');
    if (liorIdx !== -1) {
      parsed.students.splice(liorIdx, 1);
      localStorage.setItem('tutor_dashboard_v2', JSON.stringify(parsed));
    }
    // migration: fix Liza's session amount to 100
    const lizaFix = parsed.students.find(s => s.name === 'ליזה');
    if (lizaFix) {
      lizaFix.sessions.forEach(sess => { if (sess.amount === 0) sess.amount = 100; });
      localStorage.setItem('tutor_dashboard_v2', JSON.stringify(parsed));
    }
    // migration: update Liza's next lesson to 2026-04-09 and add session
    const lizaNext = parsed.students.find(s => s.name === 'ליזה');
    if (lizaNext) {
      lizaNext.nextLesson = { date: '2026-04-09', time: '18:00', type: 'יחיד' };
      if (!lizaNext.sessions.find(s => s.id === 'liza_s2')) {
        lizaNext.sessions.push({ id: 'liza_s2', date: '2026-04-09', type: 'יחיד', duration: 60, amount: 100, paid: false, notes: 'אינטגרלים המשך' });
      }
      localStorage.setItem('tutor_dashboard_v2', JSON.stringify(parsed));
    }
    // migration: add Liza if not present
    const liza = parsed.students.find(s => s.name === 'ליזה');
    if (!liza) {
      parsed.students.push({
        id: 'liza_' + Date.now(),
        name: 'ליזה',
        subject: 'מתמטיקה',
        level: 'מתחיל',
        style: 'ויזואלי',
        emoji: '✏️',
        goals: 'בניית בסיס במתמטיקה',
        phone: '',
        parent: '',
        progress: 0,
        progressNote: '',
        nextLesson: { date: '2026-04-06', time: '18:00', type: 'יחיד' },
        sessions: [
          { id: 'liza_s1', date: '2026-04-06', type: 'יחיד', duration: 60, amount: 100, paid: false, notes: 'אינטגרלים' }
        ],
        homework: [],
        notes: ''
      });
      localStorage.setItem('tutor_dashboard_v2', JSON.stringify(parsed));
    }
    return parsed;
  }
  // Default data
  return {
    students: [
      {
        id: 'liza_' + Date.now(),
        name: 'ליזה',
        subject: 'מתמטיקה',
        level: 'מתחיל',
        style: 'ויזואלי',
        emoji: '✏️',
        goals: 'בניית בסיס במתמטיקה',
        phone: '',
        parent: '',
        progress: 0,
        progressNote: '',
        nextLesson: { date: '2026-04-09', time: '18:00', type: 'יחיד' },
        sessions: [
          { id: 'liza_s1', date: '2026-04-06', type: 'יחיד', duration: 60, amount: 100, paid: false, notes: 'אינטגרלים' },
          { id: 'liza_s2', date: '2026-04-09', type: 'יחיד', duration: 60, amount: 100, paid: false, notes: 'אינטגרלים המשך' }
        ],
        homework: [],
        notes: ''
      }
    ]
  };
}

let data = loadData();

function save() {
  localStorage.setItem('tutor_dashboard_v2', JSON.stringify(data));
  const ind = document.getElementById('save-indicator');
  ind.classList.add('show');
  setTimeout(() => ind.classList.remove('show'), 1800);
}

/* ══════════════════════════════════════
   AUTH
══════════════════════════════════════ */
function checkPw() {
  const val = document.getElementById('pw-input').value;
  if (val === PASSWORD || sessionStorage.getItem('tutor_auth') === '1') {
    sessionStorage.setItem('tutor_auth', '1');
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('nav').style.display = 'flex';
    document.getElementById('main-page').style.display = 'block';
    render();
  } else {
    document.getElementById('lock-error').textContent = 'סיסמה שגויה';
    document.getElementById('pw-input').value = '';
  }
}

// Auto-login if already authenticated this session
if (sessionStorage.getItem('tutor_auth') === '1') {
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('nav').style.display = 'flex';
    document.getElementById('main-page').style.display = 'block';
    render();
  });
}

/* ══════════════════════════════════════
   RENDER
══════════════════════════════════════ */
function render() {
  renderStats();
  renderStudents();
}

function renderStats() {
  const students = data.students;
  let totalSessions = 0, totalPaid = 0, totalOwed = 0, nextLessons = 0;
  const today = new Date().toISOString().split('T')[0];

  students.forEach(s => {
    s.sessions.forEach(sess => {
      totalSessions++;
      totalOwed += sess.amount;
      if (sess.paid) totalPaid += sess.amount;
    });
    if (s.nextLesson && s.nextLesson.date >= today) nextLessons++;
  });

  const balance = totalOwed - totalPaid;

  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-card">
      <div class="s-label">תלמידים פעילים</div>
      <div class="s-value gold">${students.length}</div>
      <div class="s-sub">תלמידים רשומים</div>
    </div>
    <div class="stat-card">
      <div class="s-label">שיעורים שניתנו</div>
      <div class="s-value">${totalSessions}</div>
      <div class="s-sub">סה"כ שיעורים</div>
    </div>
    <div class="stat-card">
      <div class="s-label">שולם</div>
      <div class="s-value green">₪${totalPaid}</div>
      <div class="s-sub">מתוך ₪${totalOwed} סה"כ</div>
    </div>
    <div class="stat-card">
      <div class="s-label">יתרה לגבייה</div>
      <div class="s-value ${balance > 0 ? 'red' : 'green'}">₪${balance}</div>
      <div class="s-sub">${balance > 0 ? 'טרם שולם' : 'מלא שולם ✓'}</div>
    </div>
    <div class="stat-card">
      <div class="s-label">שיעורים קרובים</div>
      <div class="s-value gold">${nextLessons}</div>
      <div class="s-sub">מתוכננים</div>
    </div>
  `;
}

function renderStudents() {
  const grid = document.getElementById('students-grid');
  if (!data.students.length) {
    grid.innerHTML = '<div class="empty">אין תלמידים עדיין — לחץ "תלמיד חדש" כדי להתחיל</div>';
    return;
  }
  grid.innerHTML = data.students.map(s => studentCard(s)).join('');
}

function studentCard(s) {
  const paid = s.sessions.reduce((a, x) => a + (x.paid ? x.amount : 0), 0);
  const owed = s.sessions.reduce((a, x) => a + x.amount, 0);
  const balance = owed - paid;
  const hwPending = s.homework.filter(h => !h.done).length;

  return `
  <div class="student-card" id="card-${s.id}">
    <div class="sc-header">
      <div class="sc-header-left">
        <div class="sc-avatar">${s.emoji || '🎓'}</div>
        <div>
          <div class="sc-name">${s.name}</div>
          <div class="sc-subject">${s.subject}</div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
        <div class="sc-badges">
          <span class="badge badge-level">${s.level}</span>
          <span class="badge badge-style">${s.style}</span>
          ${balance > 0 ? `<span class="badge badge-warn">₪${balance} חוב</span>` : `<span class="badge badge-ok">שולם ✓</span>`}
          ${hwPending > 0 ? `<span class="badge badge-warn">${hwPending} ש"ב פתוחים</span>` : ''}
        </div>
        <button class="btn btn-danger btn-sm" onclick="deleteStudent('${s.id}')">🗑 מחק</button>
      </div>
    </div>
    <div class="sc-body">
      <div class="sc-tabs">
        <div class="sc-tab active" onclick="switchTab('${s.id}','overview',this)">סקירה</div>
        <div class="sc-tab" onclick="switchTab('${s.id}','payments',this)">תשלומים</div>
        <div class="sc-tab" onclick="switchTab('${s.id}','homework',this)">שיעורי בית</div>
        <div class="sc-tab" onclick="switchTab('${s.id}','profile',this)">פרופיל</div>
      </div>

      <!-- OVERVIEW -->
      <div class="sc-panel active" id="panel-${s.id}-overview">
        ${s.nextLesson && s.nextLesson.date ? `
        <div class="next-lesson-box" style="margin-bottom:14px">
          <div class="nl-label">📅 שיעור הבא</div>
          <div class="nl-date">${formatDate(s.nextLesson.date)}${s.nextLesson.time ? ' · ' + s.nextLesson.time : ''}</div>
          <div class="nl-meta">סוג: ${s.nextLesson.type || 'יחיד'}</div>
        </div>` : `
        <div class="next-lesson-box" style="margin-bottom:14px">
          <div class="nl-label">📅 שיעור הבא</div>
          <div class="nl-date" style="font-size:1rem;color:var(--muted)">לא קבוע</div>
        </div>`}

        <div class="field-row three">
          <div class="field"><label>תאריך שיעור הבא</label>
            <input type="date" value="${s.nextLesson?.date||''}" onchange="updateField('${s.id}','nextLesson.date',this.value)"/></div>
          <div class="field"><label>שעה</label>
            <input type="time" value="${s.nextLesson?.time||''}" onchange="updateField('${s.id}','nextLesson.time',this.value)"/></div>
          <div class="field"><label>סוג</label>
            <select onchange="updateField('${s.id}','nextLesson.type',this.value)">
              ${['יחיד','כפול','משולש'].map(t=>`<option ${(s.nextLesson?.type||'יחיד')===t?'selected':''}>${t}</option>`).join('')}
            </select>
          </div>
        </div>

        <div class="divider"></div>

        <div class="field" style="margin-bottom:10px">
          <label>התקדמות (%)</label>
          <div style="display:flex;gap:10px;align-items:center">
            <input type="number" min="0" max="100" value="${s.progress||0}"
              onchange="updateField('${s.id}','progress',+this.value)" style="width:80px;flex-shrink:0"/>
            <div style="flex:1">
              <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${s.progress||0}%"></div></div>
            </div>
          </div>
        </div>

        <div class="field">
          <label>הערות התקדמות</label>
          <textarea onchange="updateField('${s.id}','progressNote',this.value)">${s.progressNote||''}</textarea>
        </div>
      </div>

      <!-- PAYMENTS -->
      <div class="sc-panel" id="panel-${s.id}-payments">
        <div class="payment-summary">
          <div class="ps-item"><div class="psi-val" style="color:var(--text)">₪${owed}</div><div class="psi-lbl">סה"כ</div></div>
          <div class="ps-item"><div class="psi-val" style="color:var(--green)">₪${paid}</div><div class="psi-lbl">שולם</div></div>
          <div class="ps-item"><div class="psi-val" style="color:${balance>0?'var(--red)':'var(--green)'}">₪${balance}</div><div class="psi-lbl">יתרה</div></div>
          <div class="ps-item"><div class="psi-val" style="color:var(--text)">${s.sessions.length}</div><div class="psi-lbl">שיעורים</div></div>
        </div>

        <div class="add-form" id="add-session-${s.id}">
          <h4>➕ הוסף שיעור</h4>
          <div class="field-row three">
            <div class="field"><label>תאריך</label><input type="date" id="ns-date-${s.id}" value="${new Date().toISOString().split('T')[0]}"/></div>
            <div class="field"><label>סוג</label>
              <select id="ns-type-${s.id}">
                <option value="יחיד · 45 דק׳">יחיד · 45 דק׳</option>
                <option value="כפול · 90 דק׳">כפול · 90 דק׳</option>
                <option value="משולש · 135 דק׳">משולש · 135 דק׳</option>
              </select>
            </div>
            <div class="field"><label>סכום ₪</label><input type="number" id="ns-amount-${s.id}" value="120"/></div>
          </div>
          <div class="field-row">
            <div class="field"><label>סטטוס</label>
              <select id="ns-paid-${s.id}"><option value="true">✅ שולם</option><option value="false">⏳ טרם שולם</option></select>
            </div>
            <div class="field"><label>הערות</label><input type="text" id="ns-notes-${s.id}" placeholder="הערות לשיעור..."/></div>
          </div>
          <div style="display:flex;gap:8px;margin-top:10px">
            <button class="btn btn-gold btn-sm" onclick="addSession('${s.id}')">שמור שיעור</button>
            <button class="btn btn-ghost btn-sm" onclick="toggleForm('add-session-${s.id}')">ביטול</button>
          </div>
        </div>

        <button class="btn btn-outline btn-sm" style="margin-bottom:10px" onclick="toggleForm('add-session-${s.id}')">+ הוסף שיעור</button>

        ${s.sessions.length ? `
        <table class="payments-table">
          <thead><tr><th>תאריך</th><th>סוג</th><th>סכום</th><th>סטטוס</th><th></th></tr></thead>
          <tbody>
            ${s.sessions.map(sess => `
            <tr>
              <td>${formatDate(sess.date)}</td>
              <td>${sess.type}</td>
              <td>₪${sess.amount}</td>
              <td>${sess.paid ? '<span class="paid-badge">✅ שולם</span>' : `<span class="unpaid-badge">⏳ טרם שולם</span>`}</td>
              <td style="text-align:left">
                <button class="btn btn-ghost btn-sm" onclick="togglePaid('${s.id}','${sess.id}')">${sess.paid?'סמן כלא שולם':'סמן כשולם'}</button>
                <button class="btn btn-danger btn-sm" onclick="deleteSession('${s.id}','${sess.id}')">✕</button>
              </td>
            </tr>`).join('')}
          </tbody>
        </table>` : '<div class="empty">אין שיעורים עדיין</div>'}
      </div>

      <!-- HOMEWORK -->
      <div class="sc-panel" id="panel-${s.id}-homework">
        <div class="add-form" id="add-hw-${s.id}">
          <h4>➕ הוסף שיעור בית</h4>
          <div class="field-row">
            <div class="field"><label>משימה</label><input type="text" id="hw-task-${s.id}" placeholder="תאר את המשימה..."/></div>
            <div class="field"><label>תאריך</label><input type="date" id="hw-date-${s.id}" value="${new Date().toISOString().split('T')[0]}"/></div>
          </div>
          <div style="display:flex;gap:8px;margin-top:10px">
            <button class="btn btn-gold btn-sm" onclick="addHomework('${s.id}')">שמור</button>
            <button class="btn btn-ghost btn-sm" onclick="toggleForm('add-hw-${s.id}')">ביטול</button>
          </div>
        </div>

        <button class="btn btn-outline btn-sm" style="margin-bottom:12px" onclick="toggleForm('add-hw-${s.id}')">+ הוסף שיעור בית</button>

        ${s.homework.length ? `
        <div>
          ${s.homework.map(hw => `
          <div class="hw-item">
            <div class="hw-check ${hw.done?'done':''}" onclick="toggleHw('${s.id}','${hw.id}')">${hw.done?'✓':''}</div>
            <div class="hw-text">
              <div class="hw-task ${hw.done?'done-text':''}">${hw.task}</div>
              <div class="hw-date">${formatDate(hw.date)}</div>
            </div>
            <button class="btn btn-danger btn-sm" onclick="deleteHw('${s.id}','${hw.id}')">✕</button>
          </div>`).join('')}
        </div>` : '<div class="empty">אין שיעורי בית עדיין</div>'}
      </div>

      <!-- PROFILE -->
      <div class="sc-panel" id="panel-${s.id}-profile">
        <div class="field-row">
          <div class="field"><label>שם</label><input type="text" value="${s.name}" onchange="updateField('${s.id}','name',this.value)"/></div>
          <div class="field"><label>מקצוע</label><input type="text" value="${s.subject}" onchange="updateField('${s.id}','subject',this.value)"/></div>
        </div>
        <div class="field-row three">
          <div class="field"><label>רמה</label>
            <select onchange="updateField('${s.id}','level',this.value)">
              ${['מתחיל','בינוני','מתקדם','מצטיין'].map(l=>`<option ${s.level===l?'selected':''}>${l}</option>`).join('')}
            </select>
          </div>
          <div class="field"><label>סגנון למידה</label>
            <select onchange="updateField('${s.id}','style',this.value)">
              ${['ויזואלי','שמיעתי','קינסתטי','קריאה/כתיבה'].map(l=>`<option ${s.style===l?'selected':''}>${l}</option>`).join('')}
            </select>
          </div>
          <div class="field"><label>אמוג׳י</label>
            <input type="text" value="${s.emoji||'🎓'}" maxlength="2" onchange="updateField('${s.id}','emoji',this.value)"/>
          </div>
        </div>
        <div class="field-row">
          <div class="field"><label>טלפון תלמיד/ה</label><input type="text" value="${s.phone||''}" onchange="updateField('${s.id}','phone',this.value)"/></div>
          <div class="field"><label>טלפון הורה</label><input type="text" value="${s.parent||''}" onchange="updateField('${s.id}','parent',this.value)"/></div>
        </div>
        <div class="field-row single">
          <div class="field"><label>מטרות</label>
            <textarea onchange="updateField('${s.id}','goals',this.value)">${s.goals||''}</textarea>
          </div>
        </div>
        <div class="field-row single">
          <div class="field"><label>הערות כלליות</label>
            <textarea onchange="updateField('${s.id}','notes',this.value)">${s.notes||''}</textarea>
          </div>
        </div>
        <div class="divider"></div>
        <div class="field-row">
          <div class="field">
            <label>🔑 קוד הורה (פורטל הורים)</label>
            <input type="text" value="${getParentPin(s.id)}" placeholder="לדוג׳ 1234"
              onchange="setParentPin('${s.id}',this.value)"
              style="letter-spacing:.12em;font-size:1.1rem;font-weight:700;text-align:center"/>
          </div>
          <div class="field" style="justify-content:flex-end">
            <label style="visibility:hidden">link</label>
            <a href="parent-dashboard.html" target="_blank" class="btn btn-outline btn-sm" style="text-align:center;text-decoration:none">
              🔗 פתח פורטל הורים
            </a>
          </div>
        </div>
      </div>

    </div>
  </div>`;
}

/* ══════════════════════════════════════
   ACTIONS
══════════════════════════════════════ */
function switchTab(sid, tab, el) {
  const card = document.getElementById('card-' + sid);
  card.querySelectorAll('.sc-tab').forEach(t => t.classList.remove('active'));
  card.querySelectorAll('.sc-panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(`panel-${sid}-${tab}`).classList.add('active');
}

function updateField(sid, field, val) {
  const s = data.students.find(x => x.id === sid);
  if (!s) return;
  if (field.includes('.')) {
    const [a, b] = field.split('.');
    if (!s[a]) s[a] = {};
    s[a][b] = val;
  } else {
    s[field] = val;
  }
  save();
  renderStats();
  // Re-render header badges
  const card = document.getElementById('card-' + sid);
  if (card) {
    const fresh = document.createElement('div');
    fresh.innerHTML = studentCard(s);
    const newCard = fresh.firstElementChild;
    card.querySelector('.sc-header').innerHTML = newCard.querySelector('.sc-header').innerHTML;
  }
}

function toggleForm(id) {
  document.getElementById(id).classList.toggle('open');
}

function addSession(sid) {
  const s = data.students.find(x => x.id === sid);
  const date   = document.getElementById(`ns-date-${sid}`).value;
  const type   = document.getElementById(`ns-type-${sid}`).value;
  const amount = +document.getElementById(`ns-amount-${sid}`).value;
  const paid   = document.getElementById(`ns-paid-${sid}`).value === 'true';
  const notes  = document.getElementById(`ns-notes-${sid}`).value;
  if (!date || !amount) return;
  s.sessions.push({ id: 'sess_' + Date.now(), date, type, amount, paid, notes });
  save();
  render();
}

function togglePaid(sid, sessId) {
  const s = data.students.find(x => x.id === sid);
  const sess = s.sessions.find(x => x.id === sessId);
  if (sess) { sess.paid = !sess.paid; save(); render(); }
}

function deleteSession(sid, sessId) {
  const s = data.students.find(x => x.id === sid);
  s.sessions = s.sessions.filter(x => x.id !== sessId);
  save(); render();
}

function addHomework(sid) {
  const s = data.students.find(x => x.id === sid);
  const task = document.getElementById(`hw-task-${sid}`).value.trim();
  const date = document.getElementById(`hw-date-${sid}`).value;
  if (!task) return;
  s.homework.unshift({ id: 'hw_' + Date.now(), task, date, done: false });
  save(); render();
}

function toggleHw(sid, hwId) {
  const s = data.students.find(x => x.id === sid);
  const hw = s.homework.find(x => x.id === hwId);
  if (hw) { hw.done = !hw.done; save(); render(); }
}

function deleteHw(sid, hwId) {
  const s = data.students.find(x => x.id === sid);
  s.homework = s.homework.filter(x => x.id !== hwId);
  save(); render();
}

function deleteStudent(sid) {
  if (!confirm('למחוק את התלמיד?')) return;
  data.students = data.students.filter(x => x.id !== sid);
  save(); render();
}

function openModal() { document.getElementById('modal-bg').classList.add('open'); }
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }

function addStudent() {
  const name = document.getElementById('ns-name').value.trim();
  if (!name) return alert('נא להזין שם');
  data.students.push({
    id: 'stu_' + Date.now(),
    name,
    subject:       document.getElementById('ns-subject').value || '',
    level:         document.getElementById('ns-level').value,
    style:         document.getElementById('ns-style').value,
    emoji:         document.getElementById('ns-emoji').value || '🎓',
    goals:         document.getElementById('ns-goals').value || '',
    phone:         document.getElementById('ns-phone').value || '',
    parent:        document.getElementById('ns-parent').value || '',
    progress:      0,
    progressNote:  '',
    nextLesson:    { date: '', time: '', type: 'יחיד' },
    sessions:      [],
    homework:      [],
    notes:         ''
  });
  save(); closeModal(); render();
}

/* close modal on bg click */
document.getElementById('modal-bg').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

/* ══════════════════════════════════════
   UTILS
══════════════════════════════════════ */
function formatDate(d) {
  if (!d) return '—';
  const [y, m, day] = d.split('-');
  return `${day}/${m}/${y}`;
}

/* ══════════════════════════════════════
   PARENT PINS
══════════════════════════════════════ */
function getParentPin(sid) {
  try {
    const raw = localStorage.getItem('parent_pins');
    const pins = raw ? JSON.parse(raw) : {};
    return pins[sid] || '';
  } catch(e) { return ''; }
}

function setParentPin(sid, pin) {
  try {
    const raw = localStorage.getItem('parent_pins');
    const pins = raw ? JSON.parse(raw) : {};
    if (pin.trim()) pins[sid] = pin.trim();
    else delete pins[sid];
    localStorage.setItem('parent_pins', JSON.stringify(pins));
    const ind = document.getElementById('save-indicator');
    ind.classList.add('show');
    setTimeout(() => ind.classList.remove('show'), 1800);
  } catch(e) {}
}
</script>
