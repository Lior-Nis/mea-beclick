<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1080px;height:1080px;overflow:hidden;font-family:'Heebo',sans-serif;background:#04091e;}
.wrap{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:36px;padding:80px;position:relative;}
.wrap::before{content:'';position:absolute;inset:0;
  background-image:radial-gradient(rgba(255,255,255,0.18) 1px,transparent 1px);
  background-size:44px 44px;}
/* big glow */
.glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:700px;height:700px;
  background:radial-gradient(ellipse,rgba(232,164,39,0.1) 0%,transparent 65%);pointer-events:none;}

.speech{position:relative;z-index:2;background:rgba(232,164,39,0.1);
  border:2px solid rgba(232,164,39,0.4);border-radius:24px;
  padding:24px 48px;text-align:center;}
.speech p{font-size:28px;color:#e8a427;font-weight:700;letter-spacing:.04em;}

.big{position:relative;z-index:2;font-size:108px;font-weight:900;color:#f0e8d8;
  line-height:.95;text-align:center;}
.big .gold{color:#e8a427;}
.big .small-line{font-size:52px;color:#7a8bbd;font-weight:700;}

.fun-row{position:relative;z-index:2;display:flex;gap:20px;justify-content:center;}
.fun-item{background:rgba(12,22,60,0.8);border:1.5px solid rgba(232,164,39,0.2);
  border-radius:20px;padding:20px 28px;text-align:center;min-width:180px;}
.fun-item .fi{font-size:44px;display:block;margin-bottom:8px;}
.fun-item span{font-size:22px;font-weight:800;color:#f0e8d8;}

.check-list{position:relative;z-index:2;display:flex;flex-direction:column;gap:12px;width:100%;max-width:600px;}
.check{display:flex;align-items:center;gap:16px;background:rgba(232,164,39,0.06);
  border:1px solid rgba(232,164,39,0.15);border-radius:14px;padding:16px 24px;}
.check-mark{width:32px;height:32px;border-radius:50%;background:#e8a427;
  color:#04091e;font-size:18px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.check span{font-size:24px;font-weight:700;color:#f0e8d8;}

.cta{position:relative;z-index:2;background:#e8a427;color:#04091e;
  font-family:'Heebo',sans-serif;font-size:30px;font-weight:900;
  padding:20px 80px;border-radius:50px;box-shadow:0 8px 32px rgba(232,164,39,0.3);}
</style></head><body><div class="wrap">
  <div class="glow"></div>
  <div class="speech"><p>🎓 היי תלמיד/ה — השיעורים שלנו לא כמו כולם</p></div>
  <div class="big">לימוד<br><span class="gold">שמרגיש</span><br><span class="small-line">כמו משחק</span></div>
  <div class="fun-row">
    <div class="fun-item"><span class="fi">🎮</span><span>שיעורי בית<br>כמשחק</span></div>
    <div class="fun-item"><span class="fi">🤖</span><span>חומר שנבנה<br>רק בשבילך</span></div>
    <div class="fun-item"><span class="fi">⭐</span><span>ציונים<br>שמשתפרים</span></div>
  </div>
  <div class="check-list">
    <div class="check"><div class="check-mark">✓</div><span>כרטיסיות לימוד דיגיטליות</span></div>
    <div class="check"><div class="check-mark">✓</div><span>מבחוני ידע אינטראקטיביים</span></div>
    <div class="check"><div class="check-mark">✓</div><span>הסברים ברמה שלך</span></div>
  </div>
  <div class="cta">🚀 בוא נתחיל ביחד!</div>
</div></body></html>
