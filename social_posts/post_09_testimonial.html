<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1080px;height:1080px;overflow:hidden;font-family:'Heebo',sans-serif;background:#04091e;}
.wrap{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:44px;padding:80px;position:relative;}
.wrap::before{content:'';position:absolute;inset:0;
  background-image:radial-gradient(rgba(255,255,255,0.18) 1px,transparent 1px);
  background-size:44px 44px;}
.glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:700px;height:500px;
  background:radial-gradient(ellipse,rgba(232,164,39,0.08) 0%,transparent 65%);}
.tag{position:relative;z-index:2;border:1.5px solid rgba(232,164,39,0.4);
  color:#e8a427;font-size:22px;font-weight:700;letter-spacing:.12em;
  padding:10px 36px;border-radius:40px;background:rgba(232,164,39,0.08);}
.big-quote{position:relative;z-index:2;font-size:180px;color:rgba(232,164,39,0.15);
  font-family:serif;line-height:.7;align-self:flex-end;margin-left:24px;}
.main-quote{position:relative;z-index:2;background:rgba(12,22,60,0.75);
  border:1px solid rgba(232,164,39,0.2);border-radius:24px;padding:48px 52px;
  text-align:center;max-width:860px;}
.main-quote p{font-size:38px;color:#f0e8d8;font-weight:300;line-height:1.5;
  font-style:italic;}
.main-quote p span{color:#e8a427;font-weight:700;font-style:normal;}
.student{position:relative;z-index:2;display:flex;align-items:center;gap:16px;}
.student-avatar{width:64px;height:64px;border-radius:50%;
  background:rgba(232,164,39,0.15);border:2px solid rgba(232,164,39,0.4);
  display:flex;align-items:center;justify-content:center;font-size:28px;}
.student-info h4{font-size:26px;font-weight:800;color:#f0e8d8;}
.student-info p{font-size:20px;color:#7a8bbd;}
.stars{position:relative;z-index:2;font-size:44px;letter-spacing:4px;}
.bottom{position:relative;z-index:2;display:flex;gap:20px;align-items:center;}
.b-note{font-size:22px;color:#4a5580;}
.cta{background:#e8a427;color:#04091e;font-family:'Heebo',sans-serif;
  font-size:24px;font-weight:900;padding:14px 44px;border-radius:40px;}
</style></head><body><div class="wrap">
  <div class="glow"></div>
  <div class="tag">💬 מה אומרים התלמידים</div>
  <div class="big-quote">"</div>
  <div class="main-quote">
    <p>הציונים שלי <span>השתפרו מאוד</span> מאז שהתחלתי שיעורים. ההסברים תמיד ברורים, שיעורי הבית מהנים — ובאמת מרגישים שאכפת להם ממני.</p>
  </div>
  <div class="student">
    <div class="student-avatar">🎓</div>
    <div class="student-info">
      <h4>זיו כהן</h4>
      <p>תלמיד תיכון · מתמטיקה ופיזיקה</p>
    </div>
  </div>
  <div class="stars">⭐⭐⭐⭐⭐</div>
  <div class="bottom">
    <div class="b-note">ניקול וליאור · שיעורים פרטיים</div>
    <div class="cta">💬 הצטרפו אלינו</div>
  </div>
</div></body></html>
